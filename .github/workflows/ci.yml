name: CI
# Main CI workflow for validation and build on push/PR.
# For publishing releases, see:
# - publish.yml: Standard releases to npm via OIDC
# - retry-publish.yml: Republish existing versions to npm/GitHub
# - hotfix.yml: Create urgent patch releases
permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    name: Validate (Lint, Test)
    permissions:
      contents: read
      id-token: write   # required for codecov OIDC tokenless
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.19'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm run check
      - run: pnpm run typecheck
      # - run: pnpm run typecheck:tests
      - run: pnpm run test:coverage
      - run: pnpm run test:coverage:self:prod
      - name: Upload V8 coverage to codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage/coverage-final.json
          flags: v8
          fail_ci_if_error: true
          use_oidc: true
      - name: Upload Monocart self-coverage to codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./self-coverage/lcov.info
          flags: monocart
          fail_ci_if_error: true
          use_oidc: true

  build:
    runs-on: ubuntu-latest
    name: Build
    needs: [validate]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.19'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - name: Upload dist artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: ./dist
          retention-days: 30

